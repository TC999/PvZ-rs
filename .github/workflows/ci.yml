name: CI build

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-msys2-mingw32:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW32
        update: true
        install: >-
          base-devel
          mingw-w64-i686-cmake
          mingw-w64-i686-gcc
          mingw-w64-i686-glew
          mingw-w64-i686-libjpeg-turbo
          mingw-w64-i686-libopenmpt
          mingw-w64-i686-libogg
          mingw-w64-i686-libpng
          mingw-w64-i686-libvorbis
          mingw-w64-i686-mpg123
          mingw-w64-i686-ninja
          mingw-w64-i686-ntldd
          mingw-w64-i686-SDL2

    - name: Compile PvZ-Portable for Windows
      shell: msys2 {0}
      run: |
        mkdir build
        cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCONSOLE=OFF -DCMAKE_COLOR_DIAGNOSTICS=ON
        cmake --build build
        
        mkdir -p dist

        cp build/pvz-portable.exe dist/

        echo "Collecting dependencies..."
        ntldd -R dist/pvz-portable.exe \
          | grep "=>" \
          | awk '{print $3}' \
          | grep -vE '^not$' \
          | grep -ivE '[\\/]windows[\\/]' \
          | sed 's/\\/\//g' \
          | sort -u \
          | xargs -I {} cp "{}" dist/

        echo "Packed files:"
        ls -lh dist/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pvz-portable-windows-msys2-mingw32
        path: dist/
